<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>AppProspera - Controle financeiro pessoal</title>
    <meta
      name="description"
      content="Acompanhe contas, cartões, despesas e orçamentos em um só lugar."
    />
    <meta name="theme-color" content="#0b2e24" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AppProspera" />
    <meta property="og:title" content="AppProspera" />
    <meta property="og:description" content="Controle financeiro pessoal moderno." />
    <meta property="og:type" content="website" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/prospera-mark.png" type="image/png" />
    <link rel="icon" href="/icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <script>
      (() => {
        try {
          const storedTheme = window.localStorage.getItem("prospera.theme");
          const theme = ["light", "dark", "system"].includes(storedTheme) ? storedTheme : "system";
          const prefersDark =
            window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          const resolvedTheme =
            theme === "system" && prefersDark ? "dark" : theme === "dark" ? "dark" : "light";
          document.documentElement.classList.toggle("dark", resolvedTheme === "dark");
          document.documentElement.style.colorScheme = resolvedTheme;
        } catch {
          document.documentElement.style.colorScheme = "light";
        }
      })();
    </script>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
